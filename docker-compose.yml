services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-annecybike}
      POSTGRES_USER: ${POSTGRES_USER:-annecybike}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-annecybike} -d ${POSTGRES_DB:-annecybike}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  poller:
    build: ./poller
    environment:
      DB_URL: postgres://${POSTGRES_USER:-annecybike}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-annecybike}
      GBFS_URL: https://gbfs.partners.fifteen.eu/gbfs/annecy/gbfs.json
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-60}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DB_URL: postgres://${POSTGRES_USER:-annecybike}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-annecybike}
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/stats/fleet || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend

  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
